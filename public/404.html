<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Page Not Found | Isaac Njoroge</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" />
  <style>
    :root {
      --background: oklch(0.16 0.02 280);
      --foreground: oklch(0.97 0.01 90);
      --primary: oklch(0.78 0.16 75);
      --primary-fg: oklch(0.18 0.03 280);
      --muted: oklch(0.72 0.02 90);
      --card: oklch(0.21 0.03 280);
      --border: oklch(0.32 0.03 282);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: var(--background);
      color: var(--foreground);
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      background:
        radial-gradient(at 20% 20%, oklch(0.32 0.12 290 / 0.35) 0%, transparent 50%),
        radial-gradient(at 80% 80%, oklch(0.42 0.15 25 / 0.25) 0%, transparent 50%),
        var(--background);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 1.5rem;
    }
    .badge::before, .badge::after {
      content: "";
      display: block;
      height: 1px;
      width: 2rem;
      background: var(--primary);
    }

    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(5rem, 20vw, 10rem);
      line-height: 1;
      color: var(--primary);
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    h2 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 26rem;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 9999px;
      background: var(--primary);
      color: var(--primary-fg);
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      color: var(--foreground);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      background: transparent;
      transition: background 0.2s;
    }
    .btn-ghost:hover { background: var(--card); }

    .arrow { display: inline-block; transition: transform 0.2s; }
    .btn-primary:hover .arrow { transform: translate(2px, -2px); }
  </style>
</head>
<body>
  <div class="badge">404 Error</div>
  <h1>404</h1>
  <h2>Page not found.</h2>
  <p>The page you're looking for doesn't exist or has been moved. Head back home.</p>
  <div class="actions">
    <a href="/" class="btn-primary">
      Go home <span class="arrow">↗</span>
    </a>
    <a href="mailto:Njorogeisaac069@gmail.com" class="btn-ghost">
      Contact me
    </a>
  </div>
</body>
</html>
