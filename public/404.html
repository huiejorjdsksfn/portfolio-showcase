<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>404 — Page Not Found | Isaac Njoroge</title>
  <meta name="robots" content="noindex"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#161520;--fg:#f8f7f5;--primary:#d4a853;
      --prim-fg:#1a1726;--muted:#a09d96;--card:#1e1c2b;--border:#2e2c3e;
    }
    html,body{min-height:100vh;background:var(--bg);color:var(--fg);
      font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
    body{
      display:flex;align-items:center;justify-content:center;
      padding:2rem;text-align:center;
      background:
        radial-gradient(at 20% 20%,rgba(80,60,180,.3) 0%,transparent 50%),
        var(--bg);
    }
    .wrap{max-width:26rem;width:100%}
    .badge{
      display:inline-flex;align-items:center;gap:.5rem;
      font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
      color:var(--primary);margin-bottom:1.5rem;
    }
    .badge::before,.badge::after{content:"";display:block;width:2rem;height:1px;background:var(--primary)}
    h1{font-family:Georgia,serif;font-size:clamp(5rem,20vw,9rem);line-height:1;
       color:var(--primary);letter-spacing:-.03em;margin-bottom:.5rem}
    h2{font-family:Georgia,serif;font-size:clamp(1.5rem,5vw,2.25rem);
       letter-spacing:-.02em;margin-bottom:1rem}
    p{color:var(--muted);line-height:1.65;max-width:22rem;margin:0 auto 2.5rem}
    .actions{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center}
    .btn-p{
      display:inline-flex;align-items:center;gap:.4rem;
      padding:.7rem 1.6rem;border-radius:9999px;
      background:var(--primary);color:var(--prim-fg);
      font-size:.875rem;font-weight:700;text-decoration:none;transition:opacity .2s;
    }
    .btn-p:hover{opacity:.88}
    .btn-g{
      display:inline-flex;align-items:center;
      padding:.7rem 1.6rem;border-radius:9999px;
      border:1px solid var(--border);color:var(--fg);
      font-size:.875rem;font-weight:500;text-decoration:none;transition:background .2s;
    }
    .btn-g:hover{background:var(--card)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">404 Error</div>
    <h1>404</h1>
    <h2>Page not found.</h2>
    <p>The page you're looking for doesn't exist or has been moved. Head back home.</p>
    <div class="actions">
      <a href="/" class="btn-p">Go home ↗</a>
      <a href="mailto:Njorogeisaac069@gmail.com" class="btn-g">Contact me</a>
    </div>
  </div>
</body>
</html>
