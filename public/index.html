  <style>
    /* Critical above-the-fold styles — loaded synchronously to prevent FOUC */
    :root {
      --radius: 0.75rem;
      --background: oklch(0.16 0.02 280);
      --foreground: oklch(0.97 0.01 90);
      --card: oklch(0.21 0.03 280);
      --primary: oklch(0.78 0.16 75);
      --primary-foreground: oklch(0.18 0.03 280);
      --secondary: oklch(0.28 0.05 285);
      --secondary-foreground: oklch(0.97 0.01 90);
      --muted: oklch(0.24 0.03 282);
      --muted-foreground: oklch(0.72 0.02 90);
      --accent: oklch(0.55 0.18 25);
      --border: oklch(0.32 0.03 282);
      --gradient-hero: radial-gradient(at 20% 20%, oklch(0.32 0.12 290 / 0.55), transparent 50%),
                       radial-gradient(at 80% 60%, oklch(0.42 0.15 25 / 0.35), transparent 55%);
      --shadow-glow: 0 30px 80px -20px oklch(0.78 0.16 75 / 0.35);
      --shadow-card: 0 20px 40px -20px oklch(0 0 0 / 0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; background: oklch(0.16 0.02 280); }
    body {
      background: oklch(0.16 0.02 280);
      color: oklch(0.97 0.01 90);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    #root { min-height: 100vh; }

    /* Page-load spinner — hidden once React mounts */
    #initial-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: oklch(0.16 0.02 280);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.3s ease;
    }
    #initial-loader.fade-out { opacity: 0; pointer-events: none; }
    .loader-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: oklch(0.78 0.16 75);
      margin: 0 4px;
      animation: loader-bounce 1.2s ease-in-out infinite;
    }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loader-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Initial loader shown while JS hydrates -->
  <div id="initial-loader" aria-hidden="true">
    <div style="display:flex;align-items:center;">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
  </div>

  <!-- React mount point -->
  <div id="root"></div>

  <!-- Module scripts — defer keeps paint fast -->
  <script type="module" src="./assets/index-B_yuOXpl.js"></script>
  <script type="module" src="./assets/index-tCdbdMbW.js"></script>

  <script>
    // Dismiss loader once React has painted
    (function() {
      function dismissLoader() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(function() { loader.remove(); }, 350);
        }
      }
      // Fire on first React paint or at most 3s
      var observer = new MutationObserver(function(_, obs) {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          obs.disconnect();
          dismissLoader();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      setTimeout(dismissLoader, 3000);
    })();
  </script>

</body>
