name: Build & Deploy Static Portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    outputs:
      dist_path: dist/client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          echo "=== dist/client ==="
          ls -lh dist/client/
          echo "=== index.html size ==="
          wc -c dist/client/index.html
          echo "=== embedded images check ==="
          COUNT=$(grep -c "data:image/png;base64" dist/client/index.html)
          echo "$COUNT image(s) embedded"
          [ "$COUNT" -eq "4" ] && echo "✓ All 4 images OK" || echo "⚠ Expected 4, got $COUNT"

      # ── GitHub Pages ──────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

      # ── EdgeOne Pages (direct upload) ─────────────────────
      - name: Deploy to EdgeOne Pages
        if: ${{ env.EDGEONE_TOKEN != '' }}
        env:
          EDGEONE_TOKEN: ${{ secrets.EDGEONE_TOKEN }}
        run: |
          npm install -g edgeone
          edgeone pages deploy dist/client \
            --name portfolio-showcase \
            --token "$EDGEONE_TOKEN" \
            --env production \
            --area global
        continue-on-error: true

  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v5
