name: Build & Deploy Static Portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Produces dist/client/ — a fully self-contained static site:
        #   index.html   (pre-rendered, all images base64-inlined, 0 external JS deps)
        #   404.html     (dark-themed, zero JS)
        #   _redirects   (EdgeOne Pages SPA rewrite rule)
        #   _headers     (cache-control rules)
        #   assets/      (hashed CSS + JS for React hydration, optimised PNGs)

      - name: Verify output
        run: |
          echo "=== dist/client contents ==="
          ls -lh dist/client/
          echo "=== index.html size ==="
          wc -c dist/client/index.html
          echo "=== embedded images ==="
          grep -c "data:image/png;base64" dist/client/index.html && echo "image(s) embedded OK"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v5
